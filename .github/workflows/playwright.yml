name: Playwright SMOKE Tests
on:
  workflow_dispatch:
    inputs:
      environment:
          description: 'Target environment'
          required: true
          default: 'dev'
          type: choice
          options:
          - dev
          - prod
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Start app container
        run: |
          docker run -d -p 3000:3000 --name app ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          echo "Waiting for app on port 3000..."
          timeout 90 bash -c 'until curl -s -o /dev/null http://localhost:3000; do sleep 2; done'
      - name: Run Playwright tests
        run: NODE_ENV=${{ inputs.environment }} npx cucumber-js --profile ${{ inputs.environment }} --tags @smoke
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report
          path: reports/
          retention-days: 30
      - name: Prepare Pages content
        if: ${{ !cancelled() }}
        run: |
          mkdir -p gh-pages
          cp reports/cucumber-report-${{ inputs.environment }}.html gh-pages/index.html
      - name: Deploy to GitHub Pages
        if: ${{ !cancelled() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: false
